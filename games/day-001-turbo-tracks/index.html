<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DAY 001 - Turbo Tracks</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&amp;family=Space+Grotesk:wght@600&amp;display=swap');
    
    :root {
      --accent: #22f1ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #0a0a0f;
      color: #fff;
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .header {
      width: 100%;
      max-width: 800px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.35rem;
      margin: 0;
      font-weight: 600;
    }
    .back {
      color: #22f1ff;
      text-decoration: none;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .back:hover { text-decoration: underline; }
    
    .canvas-container {
      position: relative;
      background: #111;
      border: 1px solid #333;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 30px -10px rgb(0 0 0 / 0.6);
    }
    
    canvas {
      display: block;
      touch-action: none;
    }
    
    .ui {
      width: 100%;
      max-width: 800px;
      margin-top: 20px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    
    button {
      background: #222;
      color: white;
      border: 1px solid #444;
      padding: 10px 18px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.1s;
    }
    button:hover { background: #333; border-color: #666; }
    button.primary {
      background: #22f1ff;
      color: black;
      border-color: #22f1ff;
      font-weight: 600;
    }
    
    .info {
      font-size: 0.8rem;
      color: #777;
      margin-top: 16px;
      max-width: 800px;
      text-align: center;
      line-height: 1.5;
    }
    
    .status {
      font-size: 0.85rem;
      padding: 2px 12px;
      border-radius: 999px;
      background: #1f1f1f;
    }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <div style="display:flex; align-items:center; gap:8px;">
        <span style="background:#222; padding:2px 8px; border-radius:4px; font-size:0.7rem; font-family:monospace;">DAY 001</span>
        <h1>Turbo Tracks</h1>
      </div>
    </div>
    <a href="../../" class="back">← Back to all games</a>
  </div>

  <div id="menu" style="width: 100%; max-width: 800px; margin-bottom: 20px;">
    <h3 style="margin: 0 0 12px 0; font-size: 1.1rem;">Choose Your Ride</h3>
    
    <div style="display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap;">
      <div>
        <div style="font-size: 0.8rem; color: #888; margin-bottom: 4px;">CAR MODEL</div>
        <div id="car-select" style="display: flex; gap: 8px;"></div>
      </div>
      
      <div>
        <div style="font-size: 0.8rem; color: #888; margin-bottom: 4px;">COLOR</div>
        <div id="color-select" style="display: flex; gap: 6px; align-items: center;"></div>
      </div>
    </div>

    <div style="margin-bottom: 16px;">
      <div style="font-size: 0.8rem; color: #888; margin-bottom: 4px;">TRACK (7 available)</div>
      <div id="track-select" style="display: flex; gap: 6px; flex-wrap: wrap;"></div>
    </div>

    <button id="start-btn" class="primary" style="padding: 12px 28px; font-size: 1rem;">START RACE</button>
  </div>

  <div class="canvas-container" id="game-container" style="display: none;">
    <canvas id="game" width="800" height="600"></canvas>
  </div>

  <div class="ui" id="game-ui" style="display: none;">
    <div style="margin-left:auto; display:flex; gap:12px; align-items:center;">
      <div id="lap" class="status">LAP 1/3</div>
      <div id="time" class="status">TIME 0:00.00</div>
      <div id="speed" class="status">SPEED 0</div>
    </div>
  </div>

  <div class="info">
    <strong>Controls:</strong> Arrow keys or WASD &nbsp;•&nbsp; Up/W = Accelerate &nbsp;•&nbsp; Down/S = Brake &nbsp;•&nbsp; Left/Right or A/D = Steer<br>
    <small>Top-down racer with realistic physics. Complete 3 laps to win!</small>
  </div>

  <script src="game.js"></script>
</body>
</html>
